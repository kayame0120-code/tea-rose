  <style>
    :root {
      --cream: #FAF6F2;
      --powder: #F4E7E4;
      --rose: #D8A5A2;
      --beige: #EBE1D5;
      --tea: #4A3A32;
      --sage: #A4B6A0;
      --night: #2A211E;
    }
    html, body { background: #ddd5cf; }
    .photo-art, .editor-work, .color-picks,
    .icon-picks button, .icon-cover { filter: none; }
    .phone-shell, .screen { background: var(--cream); }
    .story-grid button.selecting { outline-color: var(--tea); }
    .pick-mark { background: var(--tea); }
    .icon-picks button.on { outline-color: var(--rose); }
    .qr-fake {
      border-color: var(--tea);
      background: conic-gradient(var(--tea) 25%, var(--cream) 0 50%, var(--tea) 0 75%, var(--cream) 0) 0 0/16px 16px;
    }
  </style>
